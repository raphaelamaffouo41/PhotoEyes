    --blue:#2563EB; --blue-700:#1D4ED8; --blue-500:#3B82F6; --blue-100:#DBEAFE; --blue-50:#EFF6FF;
    --line:#E2E8F0; --slate:#0F172A;

    --neutral:#64748B; --neutral-bg:#F1F5F9;
    --shadow:0 12px 32px rgba(15,23,42,.12); --shadow-sm:0 1px 2px rgba(15,23,42,.06);
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);font-family:Inter,sans-serif;color:var(--ink);-webkit-font-smoothing:antialiased}
  h1,h2,h3,.serif{font-family:'Outfit',sans-serif;letter-spacing:-.02em}

  ::-webkit-scrollbar{width:8px;height:8px}
  ::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:8px}
  .hov{transition:all .18s ease}
  .card-hov:hover{transform:translateY(-4px);box-shadow:var(--shadow)}

  .lift:hover{box-shadow:var(--shadow-sm);border-color:var(--blue-500)!important}
  .phone-shell{box-shadow:0 30px 60px rgba(15,23,42,.28)}
  .fade{animation:fade .3s ease}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
</style>

/* ============================ SMALL UI ============================ */
const Badge = ({s}) => { const o=STATUS[s]||{l:s,c:"var(--ink2)",bg:"#eee"};
  return <span style={{background:o.bg,color:o.c,fontSize:11.5,fontWeight:600,padding:"4px 10px",borderRadius:999,whiteSpace:"nowrap"}}>{o.l}</span>; };

const Stars = ({n,size=14}) => (
  <span style={{display:"inline-flex",gap:1,color:"#FBBF24"}}>
    {[1,2,3,4,5].map(i=> i<=Math.round(n) ? <I.star key={i} size={size}/> : <I.starO key={i} size={size}/>)}
  </span>
);

const Avatar = ({name,hue="var(--blue)",size=44}) => {
  const ini = name.split(" ").map(w=>w[0]).slice(0,2).join("");
  return <div style={{width:size,height:size,borderRadius:"50%",flexShrink:0,
    background:hue==="var(--blue)"?"var(--blue-100)":hue,color:hue==="var(--blue)"?"var(--blue-700)":"#fff",fontWeight:700,
    display:"flex",alignItems:"center",justifyContent:"center",fontSize:size*.36}}>{ini}</div>;
};

// "photo" = vraie image thématique (loremflickr par mot-clé) + dégradé bleu de repli (hors-ligne)
const PKW=[["marlene","wedding"],["herve","portrait"],["sandrine","fashion"],["aicha","pregnancy"],["patrick","concert"],["joel","architecture"],["linda","fashion"]];
function imgKw(s){s=(""+s).toLowerCase();for(const[k,v]of PKW){if(s.includes(k))return v;}return "photography";}
function imgLock(s){let h=0;s=""+s;for(let i=0;i<s.length;i++)h=(h*31+s.charCodeAt(i))>>>0;return h%99+1;}
const imgUrl=(seed,kw)=>`https://loremflickr.com/640/480/${encodeURIComponent(kw||imgKw(seed))}?lock=${imgLock((seed||"")+(kw||""))}`;
const Photo = ({seed="studio",h=150,label,big,radius=12,kw}) => (
  <div className="ph" style={{height:h,borderRadius:radius,position:"relative",overflow:"hidden",
    background:"linear-gradient(135deg, var(--blue-100), #c7d2fe)"}}>
    <img src={imgUrl(seed,kw)} alt="" loading="lazy"
      style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}}/>
    {label && <div style={{position:"absolute",left:10,bottom:8,color:"#fff",fontSize:12,fontWeight:600,
      textShadow:"0 1px 4px rgba(0,0,0,.5)",background:"rgba(15,23,42,.35)",padding:"2px 8px",borderRadius:999,backdropFilter:"blur(2px)"}}>{label}</div>}
  </div>
);

const Stat = ({icon:Ico,label,value,sub,tone="var(--blue)"}) => (

    <span style={{color:tone,background:"var(--blue-50)",borderRadius:12,padding:9,display:"inline-flex"}}><Ico size={18}/></span>
    <div style={{fontSize:24,fontWeight:800,marginTop:12,letterSpacing:-.5,fontFamily:"'Outfit',sans-serif",color:"var(--ink)"}}>{value}</div>
    <div style={{color:"var(--ink3)",fontSize:12.5,fontWeight:500,marginTop:2}}>{label}</div>
    {sub && <div style={{color:"var(--blue)",fontSize:11.5,marginTop:4,fontWeight:600}}>{sub}</div>}

);

// État de complétude du dossier (obligatoires) — partagé Dashboard ↔ Dossier
function dossierReady(d){
  const pieceOk=d.recto&&d.verso;
  const oks=[true, d.specs.length>0, true, true, d.photo, true, pieceOk, true];
  const done=oks.filter(Boolean).length, total=oks.length;
  return {pieceOk, done, total, ready:done===total};
}

);
const DossierField=({label,value,area})=>(
  <label style={{display:"block",marginBottom:12}}>
    <span style={{fontSize:12.5,fontWeight:600,color:"var(--ink)"}}>{label}</span>
    {area
      ? <textarea defaultValue={value} rows={3} style={{marginTop:6,width:"100%",border:"1px solid var(--line)",borderRadius:12,padding:"11px 13px",fontSize:13.5,fontFamily:"inherit",color:"var(--ink)",resize:"vertical",outline:"none"}}/>
      : <input defaultValue={value} style={{marginTop:6,width:"100%",border:"1px solid var(--line)",borderRadius:12,padding:"11px 13px",fontSize:14,fontFamily:"inherit",color:"var(--ink)",outline:"none"}}/>}
  </label>
);
const DossierDrop=({label,sub,done,onClick})=>(
  <div onClick={onClick} className="lift hov" style={{flex:1,minWidth:0,border:"1.5px dashed "+(done?"var(--ok)":"#cbd5e1"),borderRadius:14,padding:"18px 14px",
    textAlign:"center",background:done?"var(--ok-bg)":"var(--blue-50)",cursor:"pointer"}}>
    <span style={{display:"inline-flex",width:38,height:38,borderRadius:11,alignItems:"center",justifyContent:"center",
      background:done?"var(--ok)":"var(--blue)",color:"#fff",marginBottom:8}}>{done?<I.check size={18}/>:<I.upload size={18}/>}</span>
    <div style={{fontSize:13,fontWeight:700,color:"var(--ink)"}}>{label}</div>
    <div style={{fontSize:11.5,color:done?"var(--ok)":"var(--ink3)",marginTop:2,fontWeight:done?600:400}}>{done?"✓ Ajouté · cliquez pour retirer":sub}</div>
  </div>
);

function ScreenDossier({mobile, go, dossier, setDossier}){
  // Dossier interactif (UC-P01 / §10.5) — état partagé avec le Dashboard (remonté dans App)
  const SPECS=["Mariage","Portrait","Corporate","Mode","Grossesse","Événementiel","Immobilier","Produit"];
  const up = dossier;              // recto / verso / photo / diplome / references
  const specs = dossier.specs;
  const submitted = dossier.submitted;
  const tog=k=>setDossier(d=>({...d,[k]:!d[k]}));
  const togSpec=s=>setDossier(d=>({...d,specs:d.specs.includes(s)?d.specs.filter(x=>x!==s):[...d.specs,s]}));
  const setSubmitted=v=>setDossier(d=>({...d,submitted:v}));
  const portfolio=["pf0","pf1","pf2","pf3","pf4"]; // 5 / 5 minimum
  const pieceOk=up.recto&&up.verso;
  const checklist=[
    {l:"Description du profil",ok:true,req:"obl"},
    {l:"Spécialités (≥ 1)",ok:specs.length>0,req:"obl"},
    {l:"Ville",ok:true,req:"obl"},
    {l:"Tarifs par prestation",ok:true,req:"obl"},
    {l:"Photo de profil",ok:up.photo,req:"obl"},
    {l:"Portfolio (≥ 5 photos)",ok:true,req:"obl"},
    {l:"Pièce d'identité (recto-verso)",ok:pieceOk,req:"obl"},
    {l:"Téléphone vérifié (SMS)",ok:true,req:"obl"},
    {l:"Diplôme / attestation",ok:up.diplome,req:"opt"},
    {l:"Références clients",ok:up.references,req:"opt"},
  ];
  const done=checklist.filter(c=>c.req==="obl"&&c.ok).length;
  const total=checklist.filter(c=>c.req==="obl").length;
  const pct=Math.round(done/total*100);
  const ready=done===total;

  // ---- Confirmation après soumission (UC-P01 étape 8 → décision admin UC-A01) ----
  if(submitted){
    const dec=dossier.decision;
    const cfg = dec==="validated"
      ? {icon:I.shield,bg:"var(--ok-bg)",fg:"var(--ok)",title:"Dossier validé 🎉",statutC:"var(--ok)",statut:"VALIDÉ · PROFIL VISIBLE",visi:"Visible publiquement",
         text:"Votre dossier a été validé par l'administrateur. Votre profil est désormais vérifié et visible publiquement — vous pouvez recevoir des missions.",
         note:"Félicitations ! Votre badge « Photographe Vérifié » est actif. Gérez vos disponibilités pour recevoir des missions."}
      : dec==="rejected"
      ? {icon:I.x,bg:"var(--danger-bg)",fg:"var(--danger)",title:"Dossier à corriger",statutC:"var(--danger)",statut:"REJETÉ",visi:"Non visible",
         text:"Votre dossier a été rejeté par l'administrateur. Vérifiez les éléments requis et resoumettez votre dossier.",
         note:"Vous pouvez corriger puis resoumettre (maximum 3 soumissions — au 3e refus, le compte est bloqué)."}
      : {icon:I.check,bg:"var(--ok-bg)",fg:"var(--ok)",title:"Dossier soumis 🎉",statutC:"var(--warn)",statut:"EN ATTENTE DE VALIDATION",visi:"Après validation admin",
         text:"Votre dossier a été transmis à l'administrateur. Traitement sous 72h ouvrées. Vous recevrez une notification dès la décision.",
         note:"Votre profil reste invisible du public jusqu'à validation. En cas de refus, vous pourrez corriger et resoumettre (max. 3 soumissions)."};
    const Ico=cfg.icon;
    return (
      <div className="fade" style={{maxWidth:560,margin:"0 auto",textAlign:"center",paddingTop:mobile?10:30}}>
        <div style={{width:76,height:76,borderRadius:"50%",background:cfg.bg,color:cfg.fg,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 18px"}}><Ico size={40}/></div>
        <h1 style={{fontSize:26,margin:"0 0 8px"}}>{cfg.title}</h1>
        <p style={{color:"var(--ink2)",fontSize:14.5,lineHeight:1.6,margin:"0 auto 20px",maxWidth:420}}>{cfg.text}</p>
        <div style={{background:"#fff",border:"1px solid var(--line)",borderRadius:18,padding:18,textAlign:"left",boxShadow:"var(--shadow-sm)"}}>
          {[["Statut",cfg.statut],["Éléments transmis",total+" / "+total+" obligatoires"],["Délai de traitement","72h ouvrées"],["Visibilité du profil",cfg.visi]].map((r,i)=>(
            <div key={i} style={{display:"flex",justifyContent:"space-between",gap:10,padding:"10px 0",borderBottom:i<3?"1px dashed var(--line)":"none",fontSize:13.5}}>
              <span style={{color:"var(--ink3)"}}>{r[0]}</span><strong style={{color:i===0?cfg.statutC:"var(--ink)"}}>{r[1]}</strong></div>))}
        </div>
        <div style={{marginTop:16}}><OpacityNote>{cfg.note}</OpacityNote></div>
        <div style={{display:"flex",gap:10,marginTop:18,flexDirection:mobile?"column":"row"}}>
          {go && <GoldBtn full onClick={()=>go("Dashboard")}>Aller au tableau de bord <I.arrow size={17}/></GoldBtn>}
          {dec==="rejected"
            ? <GoldBtn ghost full onClick={()=>setDossier(d=>({...d,submitted:false,decision:null}))}>Corriger et resoumettre</GoldBtn>
            : <GoldBtn ghost full onClick={()=>setSubmitted(false)}>Revoir mon dossier</GoldBtn>}
        </div>
      </div>
    );
  }

  return (
    <div className="fade">
      <h1 style={{fontSize:26,margin:"0 0 4px"}}>Compléter mon dossier</h1>
      <p style={{color:"var(--ink3)",margin:"0 0 16px",fontSize:14}}>Renseignez votre profil et joignez les pièces requises. L'admin valide sous 72h ouvrées.</p>

      {/* bandeau statut + progression (dynamique) */}
      <div style={{display:"flex",gap:14,alignItems:mobile?"flex-start":"center",flexDirection:mobile?"column":"row",
        background:ready?"var(--ok-bg)":"var(--warn-bg)",border:"1px solid "+(ready?"#86EFAC":"#FDE68A"),borderRadius:16,padding:16,marginBottom:18}}>
        <span style={{width:42,height:42,borderRadius:12,background:ready?"var(--ok)":"var(--warn)",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><I.shield size={22}/></span>
        <div style={{flex:1,minWidth:0,width:mobile?"100%":"auto"}}>
          <strong style={{fontSize:14.5,color:ready?"var(--ok)":"var(--warn)"}}>{ready?"Dossier complet — prêt à être soumis":"Dossier incomplet — Profil non visible"}</strong>
          <div style={{color:ready?"#166534":"#92400E",fontSize:12.5,margin:"3px 0 8px"}}>{done} / {total} éléments obligatoires complétés</div>
          <div style={{height:8,borderRadius:999,background:ready?"#86EFAC":"#FDE68A",overflow:"hidden"}}>
            <div style={{height:"100%",width:pct+"%",background:ready?"var(--ok)":"var(--warn)",borderRadius:999,transition:"width .3s"}}/>
          </div>
        </div>
      </div>

      <div style={{display:"grid",gridTemplateColumns:mobile?"1fr":"1.6fr 1fr",gap:18,alignItems:"start"}}>
        {/* colonne formulaire */}
        <div>
          <DossierCard title="Informations du profil" tag="obl">
            <DossierField label="Description" area value="Photographe mariage & événementiel, 12 ans d'expérience. Style intemporel et lumineux."/>
            <span style={{fontSize:12.5,fontWeight:600,color:"var(--ink)"}}>Spécialités <span style={{color:"var(--ink3)",fontWeight:400}}>· cliquez pour (dé)sélectionner</span></span>
            <div style={{display:"flex",gap:7,flexWrap:"wrap",margin:"8px 0 14px"}}>
              {SPECS.map(s=>{const on=specs.includes(s);return (
                <span key={s} onClick={()=>togSpec(s)} className="hov" style={{cursor:"pointer",fontSize:12.5,fontWeight:on?600:500,padding:"6px 12px",borderRadius:999,
                  border:"1px solid "+(on?"var(--blue)":"var(--line)"),background:on?"var(--blue-50)":"#fff",color:on?"var(--blue-700)":"var(--ink2)",
                  display:"inline-flex",alignItems:"center",gap:5}}>{on&&<I.check size={13}/>}{s}</span>);})}
            </div>
            {specs.length===0 && <div style={{margin:"-6px 0 12px",fontSize:11.5,color:"var(--warn)",display:"flex",gap:5,alignItems:"center"}}><I.clock size={13}/>Sélectionnez au moins une spécialité.</div>}
            <DossierField label="Ville" value="Yaoundé"/>
          </DossierCard>

          <DossierCard title="Tarifs par prestation" tag="obl" sub="Le montant net (après commission) vous est présenté avant chaque mission.">
            {[["Séance portrait (1h)","45 000"],["Demi-journée","120 000"],["Journée complète","180 000"]].map((t,i)=>(
              <div key={i} style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
                <span style={{flex:1,fontSize:13.5,color:"var(--ink2)"}}>{t[0]}</span>
                <div style={{display:"flex",alignItems:"center",gap:6,border:"1px solid var(--line)",borderRadius:10,padding:"8px 11px"}}>
                  <input defaultValue={t[1]} style={{width:70,border:"none",outline:"none",fontSize:14,fontFamily:"inherit",textAlign:"right",color:"var(--ink)"}}/>
                  <span style={{fontSize:12.5,color:"var(--ink3)"}}>FCFA</span>
                </div>
              </div>))}
          </DossierCard>

          <DossierCard title="Photo de profil" tag="obl" sub="Visage visible, fond neutre recommandé.">
            {up.photo ? (
              <div style={{display:"flex",gap:14,alignItems:"center",flexDirection:mobile?"column":"row"}}>
                <div style={{borderRadius:16,overflow:"hidden",width:84,height:84,flexShrink:0,border:"3px solid #fff",boxShadow:"var(--shadow-sm)"}}><Photo seed="marlene" h={84} radius={0}/></div>
                <div style={{flex:1,minWidth:0,width:mobile?"100%":"auto"}}>
                  <span style={{display:"inline-flex",alignItems:"center",gap:5,fontSize:12.5,fontWeight:600,color:"var(--ok)"}}><I.check size={15}/>Photo ajoutée</span>
                  <div style={{marginTop:10,display:"flex",gap:8,flexDirection:mobile?"column":"row"}}>
                    <GoldBtn ghost small full={mobile}><I.upload size={15}/>Remplacer</GoldBtn>
                    <GoldBtn ghost small full={mobile} onClick={()=>tog('photo')}><I.x size={15}/>Retirer</GoldBtn>
                  </div>
                </div>
              </div>
            ) : (
              <DossierDrop label="Ajouter une photo de profil" sub="JPG ou PNG · visage visible, fond neutre" done={false} onClick={()=>tog('photo')}/>
            )}
          </DossierCard>

          <DossierCard title="Portfolio" tag="obl" sub="Minimum 5 photos, dans au moins une spécialité.">
            <div style={{display:"grid",gridTemplateColumns:mobile?"1fr 1fr":"repeat(3,1fr)",gap:10}}>
              {portfolio.map((s,i)=><Photo key={i} seed={"marlene-"+s} h={mobile?100:104} label={specs.length?specs[i%specs.length]:"Photo"}/>)}
              <div className="lift hov" style={{height:mobile?100:104,borderRadius:12,border:"1.5px dashed #cbd5e1",background:"var(--blue-50)",
                display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:4,cursor:"pointer",color:"var(--blue)"}}>
                <I.upload size={20}/><span style={{fontSize:11.5,fontWeight:600}}>Ajouter</span></div>
            </div>
            <div style={{marginTop:10,fontSize:12.5,fontWeight:600,color:"var(--ok)",display:"inline-flex",alignItems:"center",gap:5}}><I.check size={15}/>5 / 5 minimum atteint</div>
          </DossierCard>

          <DossierCard title="Pièce d'identité" tag="obl" sub="CNI ou passeport, recto-verso, lisible et non expiré.">
            <div style={{display:"flex",gap:12,flexDirection:mobile?"column":"row"}}>
              <DossierDrop label="Recto" sub="JPG ou PDF · max 10 Mo" done={up.recto} onClick={()=>tog('recto')}/>
              <DossierDrop label="Verso" sub="JPG ou PDF · max 10 Mo" done={up.verso} onClick={()=>tog('verso')}/>
            </div>
            {pieceOk
              ? <div style={{marginTop:10,fontSize:12.5,fontWeight:600,color:"var(--ok)",display:"inline-flex",alignItems:"center",gap:5}}><I.check size={15}/>Pièce d'identité complète (recto-verso)</div>
              : <div style={{marginTop:10,fontSize:12.5,fontWeight:600,color:"var(--warn)",display:"inline-flex",alignItems:"center",gap:5}}><I.clock size={15}/>Document requis manquant — bloque la soumission</div>}
          </DossierCard>

          <DossierCard title="Documents valorisants" tag="opt" sub="Facultatif — renforce la confiance lors de la validation.">
            <div style={{display:"flex",gap:12,flexDirection:mobile?"column":"row"}}>
              <DossierDrop label="Diplôme / attestation" sub="Formation ou atelier" done={up.diplome} onClick={()=>tog('diplome')}/>
              <DossierDrop label="Références clients" sub="Contacts (optionnel)" done={up.references} onClick={()=>tog('references')}/>
            </div>
          </DossierCard>
        </div>

        {/* colonne récap / soumission */}
        <div style={{position:mobile?"static":"sticky",top:10}}>
          <div style={{background:"#fff",border:"1px solid var(--line)",borderRadius:18,padding:18,boxShadow:"var(--shadow-sm)"}}>
            <h3 style={{margin:"0 0 4px",fontSize:17}}>Checklist de validation</h3>
            <p style={{margin:"0 0 10px",color:"var(--ink3)",fontSize:12.5}}>Complétude : <b style={{color:ready?"var(--ok)":"var(--warn)"}}>{pct}%</b></p>
            {checklist.map((c,i)=>(
              <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:i<checklist.length-1?"1px solid var(--line)":"none"}}>
                <span style={{width:22,height:22,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,
                  background:c.ok?"var(--ok-bg)":(c.req==="obl"?"var(--warn-bg)":"var(--neutral-bg)"),
                  color:c.ok?"var(--ok)":(c.req==="obl"?"var(--warn)":"var(--ink3)")}}>{c.ok?<I.check size={13}/>:(c.req==="obl"?<I.clock size={13}/>:<I.x size={12}/>)}</span>
                <span style={{flex:1,fontSize:12.5,color:"var(--ink2)"}}>{c.l}</span>
                <span style={{fontSize:9.5,fontWeight:700,color:c.req==="obl"?"var(--danger)":"var(--neutral)",
                  background:c.req==="obl"?"var(--danger-bg)":"var(--neutral-bg)",padding:"2px 6px",borderRadius:999}}>{c.req==="obl"?"Requis":"Option"}</span>
              </div>))}
            <div style={{marginTop:16,display:"flex",flexDirection:"column",gap:9}}>
              <button disabled={!ready} onClick={()=>ready&&setSubmitted(true)} className={ready?"btn-blue hov":""} style={{width:"100%",padding:"12px 20px",borderRadius:999,fontWeight:600,fontSize:14,
                display:"inline-flex",alignItems:"center",justifyContent:"center",gap:8,border:"none",
                background:ready?"var(--blue)":"var(--neutral-bg)",color:ready?"#fff":"var(--ink3)",cursor:ready?"pointer":"not-allowed",
                boxShadow:ready?"0 8px 18px rgba(37,99,235,.28)":"none"}}>
                <I.shield size={17}/>Soumettre à validation</button>
              <GoldBtn ghost full><I.check size={15}/>Enregistrer le brouillon</GoldBtn>
            </div>
            {!ready && <div style={{marginTop:10,fontSize:12,color:"var(--warn)",display:"flex",gap:6,alignItems:"flex-start"}}>
              <I.clock size={14} style={{marginTop:1,flexShrink:0}}/>{total-done} élément(s) obligatoire(s) manquant(s).</div>}
            <div style={{marginTop:12}}>
              <OpacityNote>Traitement sous <b>72h ouvrées</b>. Maximum <b>3 soumissions</b> — au 3e refus, le compte est bloqué (contact support). Votre profil reste invisible jusqu'à validation.</OpacityNote>
            </div>
          </div>
          {go && <div style={{marginTop:12}}><GoldBtn ghost full onClick={()=>go("Dashboard")}><I.chev size={15} style={{transform:"rotate(180deg)"}}/>Retour au tableau de bord</GoldBtn></div>}
        </div>
      </div>
    </div>
  );
}

/* ============================ ROUTER ============================ */
function renderScreen(role, screen, ctx){
  const {selected, setSelected, go, mobile, dossier, setDossier} = ctx;
  if(role==="visiteur"){
    if(screen==="Recherche") return <ScreenRecherche mobile={mobile} onOpen={p=>{setSelected(p);go("Profil");}}/>;
    if(screen==="Profil") return <ScreenProfil mobile={mobile} p={selected} onReserve={()=>go("__resa")}/>;
  }
  if(role==="client"){
    if(screen==="Recherche") return <ScreenRecherche mobile={mobile} onOpen={p=>{setSelected(p);go("__profil");}}/>;
    if(screen==="__profil") return <ScreenProfil mobile={mobile} p={selected} onReserve={()=>go("__resa")}/>;
    if(screen==="__resa") return <ScreenReservation mobile={mobile} p={selected} onBack={()=>go("__profil")}/>;
    if(screen==="Réservations") return <ScreenResasClient mobile={mobile}/>;
    if(screen==="Favoris") return <ScreenRecherche mobile={mobile} onOpen={p=>{setSelected(p);go("__profil");}}/>;
    if(screen==="Messages") return <MessagesView mobile={mobile} who="admin"/>;
  }
  if(role==="photographe"){
    if(screen==="Dashboard") return <ScreenPhotoDash mobile={mobile} go={go} dossier={dossier}/>;
    if(screen==="Dossier") return <ScreenDossier mobile={mobile} go={go} dossier={dossier} setDossier={setDossier}/>;
    if(screen==="Missions") return <ScreenMissions mobile={mobile}/>;
    if(screen==="Agenda") return <AgendaView mobile={mobile}/>;
    if(screen==="Finances") return <ScreenPhotoDash mobile={mobile}/>;
  }
  if(role==="admin"){
    if(screen==="Dashboard") return <ScreenAdminDash mobile={mobile} onGo={go} dossier={dossier}/>;
    if(screen==="Demandes") return <ScreenMatching mobile={mobile}/>;
    if(screen==="Validations") return <ValidationsView mobile={mobile} dossier={dossier} setDossier={setDossier}/>;
    if(screen==="Litiges") return <LitigesView mobile={mobile}/>;
  }
  return <div className="fade" style={{color:"var(--ink3)",padding:40,textAlign:"center"}}>Écran « {screen} »</div>;
}

    <h1 style={{fontSize:26,margin:"0 0 4px"}}>Litige — #RS-1990</h1>
    <p style={{color:"var(--ink3)",fontSize:14,margin:"0 0 14px"}}>Recueillez les éléments des deux parties séparément, puis arbitrez.</p>
    <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:14}}>
      <span style={{background:"var(--danger-bg)",color:"var(--danger)",fontWeight:700,fontSize:11.5,padding:"4px 10px",borderRadius:999}}>EN LITIGE</span>
      <span style={{color:"var(--ink3)",fontSize:13}}>Paiements gelés · ouvert il y a 1 jour</span>
    </div>
    <div style={{display:"grid",gridTemplateColumns:mobile?"1fr":"1fr 1fr",gap:12}}>
      <div style={{background:"#fff",border:"1px solid var(--line)",borderRadius:14,padding:15,boxShadow:"var(--shadow-sm)"}}>
        <strong style={{fontSize:13.5,color:"var(--info)"}}>Version du client</strong>
        <p style={{fontSize:13,color:"var(--ink2)",lineHeight:1.5,margin:"8px 0 0"}}>« Photos livrées mais 2 cadrages flous, qualité en deçà de ce qui était promis. »</p>
        <div style={{marginTop:10,fontSize:11.5,color:"var(--ink3)"}}>2 captures jointes</div>
      </div>
      <div style={{background:"#fff",border:"1px solid var(--line)",borderRadius:14,padding:15,boxShadow:"var(--shadow-sm)"}}>
        <strong style={{fontSize:13.5,color:"var(--neutral)"}}>Version du photographe</strong>
        <p style={{fontSize:13,color:"var(--ink2)",lineHeight:1.5,margin:"8px 0 0"}}>« Conditions de lumière difficiles signalées au client. Retouches proposées gratuitement. »</p>
        <div style={{marginTop:10,fontSize:11.5,color:"var(--ink3)"}}>Réponse sous 48h</div>
      </div>
    </div>
    <div style={{background:"#fff",border:"1px solid var(--line)",borderRadius:18,padding:16,marginTop:12,boxShadow:"var(--shadow-sm)"}}>
      <strong style={{fontSize:14}}>Décision d'arbitrage</strong>
      <div style={{display:"flex",gap:8,flexWrap:"wrap",marginTop:12}}>
        <GoldBtn small ghost>Remboursement total</GoldBtn>
        <GoldBtn small>Remboursement partiel</GoldBtn>
        <GoldBtn small ghost>Clôture sans remboursement</GoldBtn>
      </div>
      <div style={{marginTop:12}}><OpacityNote>Les deux parties seront notifiées séparément. Elles ne communiquent jamais directement pendant l'instruction.</OpacityNote></div>
    </div>
  </div>
);

/* ============================ LAYOUTS ============================ */
function Sidebar({role, screen, go}){
  return (
    <aside style={{width:248,background:"var(--slate)",color:"#fff",minHeight:"100%",padding:"22px 16px",display:"flex",flexDirection:"column",flexShrink:0}}>
      <div style={{display:"flex",alignItems:"center",gap:10,padding:"0 8px 20px"}}>
        <span style={{width:36,height:36,borderRadius:10,background:"var(--blue)",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 6px 14px rgba(37,99,235,.4)"}}><I.aperture size={22}/></span>
        <div><div style={{fontWeight:800,fontSize:16,fontFamily:"'Outfit',sans-serif"}}>Studio<span style={{color:"var(--blue-500)"}}>Link</span></div>
        <div style={{fontSize:10.5,color:"#94a3b8",letterSpacing:.5}}>{ROLE_NET[role]}</div></div>
      </div>
      <nav style={{display:"flex",flexDirection:"column",gap:3,flex:1}}>
        {NAV[role].map(([ic,label,key])=>{const act=screen===key||(screen.startsWith("__")&&key===NAV[role][0][2]);
          return <button key={key} onClick={()=>go(key)} className="nav-it hov" style={{display:"flex",alignItems:"center",gap:11,padding:"11px 12px",borderRadius:12,
            background:act?"var(--blue)":"transparent",color:act?"#fff":"#cbd5e1",fontWeight:act?600:500,fontSize:13.5,textAlign:"left"}}>
            {React.createElement(I[ic],{size:18})}{label}</button>;})}
      </nav>
      <div style={{borderTop:"1px solid #1e293b",paddingTop:14,marginTop:10}}>
        <div style={{display:"flex",alignItems:"center",gap:10,padding:"0 8px"}}>
          <Avatar name={role==="admin"?"Admin SL":role==="photographe"?"Marlène Atangana":"Client SL"} hue="var(--blue)" size={34}/>
          <div style={{minWidth:0}}><div style={{fontSize:13,fontWeight:600,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{role==="admin"?"Administrateur":role==="photographe"?"Marlène A.":"Mon compte"}</div>
          <div style={{fontSize:11,color:"#94a3b8"}}>Yaoundé, CM</div></div>
        </div>
      </div>
    </aside>
  );
}

function DesktopLayout({role, screen, go, body, onAuth}){
  return (
    <div style={{display:"flex",minHeight:600,border:"1px solid var(--line)",borderRadius:24,overflow:"hidden",background:"var(--bg)",boxShadow:"var(--shadow)"}}>
      {role!=="visiteur" && <Sidebar role={role} screen={screen} go={go}/>}
      <div style={{flex:1,minWidth:0,display:"flex",flexDirection:"column"}}>
        <header style={{background:"var(--surface)",borderBottom:"1px solid var(--line)",padding:"12px 22px",display:"flex",alignItems:"center",gap:14}}>
          {role==="visiteur" && <div style={{display:"flex",alignItems:"center",gap:9,marginRight:"auto"}}>
            <span style={{width:34,height:34,borderRadius:10,background:"var(--blue)",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff"}}><I.aperture size={20}/></span>
            <span style={{fontWeight:800,fontSize:17,fontFamily:"'Outfit',sans-serif"}}>Studio<span style={{color:"var(--blue)"}}>Link</span></span></div>}
          {role!=="visiteur" && <div style={{display:"flex",alignItems:"center",gap:9,flex:1,maxWidth:360,background:"var(--bg)",border:"1px solid var(--line)",borderRadius:999,padding:"9px 14px",color:"var(--ink3)"}}>
            <I.search size={17}/><span style={{fontSize:13.5}}>Rechercher…</span></div>}
          <button className="hov" style={{position:"relative",color:"var(--ink2)",padding:6}}>
            <I.bell size={20}/><span style={{position:"absolute",top:3,right:3,width:8,height:8,borderRadius:"50%",background:"var(--blue)"}}/></button>
          {role==="visiteur" ? <><GoldBtn ghost small onClick={()=>onAuth("login")}>Se connecter</GoldBtn><GoldBtn small onClick={()=>onAuth("signup")}>S'inscrire</GoldBtn></>
            : <button className="hov" style={{color:"var(--ink3)",padding:6}}><I.logout size={20}/></button>}
        </header>
        <main style={{padding:24,overflow:"auto",flex:1}}>{body}</main>
      </div>
    </div>
  );
}

function MobileLayout({role, screen, go, body, onAuth}){
  const items = NAV[role];
  return (
    <div style={{display:"flex",justifyContent:"center"}}>
      <div className="phone-shell" style={{width:390,maxWidth:"100%",background:"var(--bg)",borderRadius:38,border:"9px solid #0f172a",overflow:"hidden",display:"flex",flexDirection:"column",height:780}}>
        <div style={{background:"#0f172a",height:24,display:"flex",justifyContent:"center"}}><div style={{width:120,height:18,background:"#0f172a",borderRadius:"0 0 14px 14px"}}/></div>
        <header style={{background:"var(--surface)",borderBottom:"1px solid var(--line)",padding:"12px 16px",display:"flex",alignItems:"center",gap:10}}>
          <span style={{width:30,height:30,borderRadius:9,background:"var(--blue)",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff"}}><I.aperture size={18}/></span>
          <span style={{fontWeight:800,fontSize:16,fontFamily:"'Outfit',sans-serif"}}>Studio<span style={{color:"var(--blue)"}}>Link</span></span>
          {role==="visiteur"
            ? <span style={{marginLeft:"auto",display:"flex",gap:6}}>
                <button onClick={()=>onAuth("login")} className="hov" style={{color:"var(--blue-700)",background:"var(--blue-50)",borderRadius:999,padding:6,display:"flex"}}><I.user size={18}/></button>
                <GoldBtn small onClick={()=>onAuth("signup")}>S'inscrire</GoldBtn>
              </span>
            : <span style={{marginLeft:"auto",position:"relative",color:"var(--ink2)"}}><I.bell size={20}/><span style={{position:"absolute",top:-1,right:-1,width:7,height:7,borderRadius:"50%",background:"var(--blue)"}}/></span>}
        </header>
        <main style={{flex:1,overflow:"auto",padding:16}}>{body}</main>
        <nav style={{background:"var(--surface)",borderTop:"1px solid var(--line)",display:"flex",justifyContent:"space-around",padding:"8px 4px 14px"}}>
          {items.map(([ic,label,key])=>{const act=screen===key||(screen.startsWith("__")&&key===items[0][2]);
            return <button key={key} onClick={()=>go(key)} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3,minWidth:60,padding:"4px 0",color:act?"var(--blue)":"var(--ink3)"}}>
              {React.createElement(I[ic],{size:21})}<span style={{fontSize:9.5,fontWeight:act?700:500}}>{items.find(x=>x[2]===key)[2]}</span></button>;})}
        </nav>
      </div>
    </div>
  );
}

/* ============================ APP SHELL ============================ */
function App(){
  const [mode,setMode]=useState("desktop");
  const [role,setRole]=useState("visiteur");
  const [screen,setScreen]=useState("Recherche");
  const [selected,setSelected]=useState(PHOTOGRAPHERS[0]);
  const [auth,setAuth]=useState(null); // null | "login" | "signup"
  const [dossier,setDossier]=useState({recto:false,verso:false,photo:true,diplome:false,references:false,specs:["Mariage","Portrait","Corporate"],submitted:false,decision:null});

  const defScreen = r => NAV[r][0][2];
  const switchRole = r => { setRole(r); setScreen(defScreen(r)); };
  const go = s => setScreen(s);
  const doAuth = (r, kind) => { // "connexion" réussie → entre dans l'espace
    setAuth(null); switchRole(r);
    if(kind==="signup" && r==="photographe") setScreen("Dossier"); // UC-P00 → UC-P01
  };
  const mobile = mode==="mobile";
  const body = renderScreen(role, screen, {selected,setSelected,go,mobile,dossier,setDossier});
  const Layout = mobile ? MobileLayout : DesktopLayout;

  return (
    <div style={{minHeight:"100vh"}}>
      {/* control bar */}
      <div style={{background:"var(--slate)",color:"#fff",padding:"14px 20px",display:"flex",alignItems:"center",gap:16,flexWrap:"wrap",position:"sticky",top:0,zIndex:50}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginRight:"auto"}}>
          <span style={{width:34,height:34,borderRadius:10,background:"var(--blue)",display:"flex",alignItems:"center",justifyContent:"center"}}><I.aperture size={20}/></span>
          <div><div style={{fontWeight:800,fontSize:15,fontFamily:"'Outfit',sans-serif"}}>Maquette — Plateforme Photographes</div>
          <div style={{fontSize:11,color:"#94a3b8"}}>Principe d'opacité · Cameroun · FCFA</div></div>
        </div>
        {/* role switch */}
        <div style={{display:"flex",gap:4,background:"#1e293b",padding:4,borderRadius:999}}>
          {ROLES.map(([k,l])=>(
            <button key={k} onClick={()=>switchRole(k)} style={{padding:"7px 14px",borderRadius:999,fontSize:12.5,fontWeight:600,
              background:role===k?"var(--blue)":"transparent",color:role===k?"#fff":"#cbd5e1"}}>{l}</button>))}
        </div>
        {/* device switch */}
        <div style={{display:"flex",gap:4,background:"#1e293b",padding:4,borderRadius:999}}>
          {[["desktop","🖥  Desktop"],["mobile","📱  Mobile"]].map(([k,l])=>(
            <button key={k} onClick={()=>setMode(k)} style={{padding:"7px 14px",borderRadius:999,fontSize:12.5,fontWeight:600,
              background:mode===k?"#fff":"transparent",color:mode===k?"var(--slate)":"#cbd5e1"}}>{l}</button>))}
        </div>
      </div>

      <div style={{maxWidth:1240,margin:"0 auto",padding:mobile?"24px 14px 50px":"26px 22px 60px"}}>
        <Layout role={role} screen={screen} go={go} body={body} onAuth={setAuth}/>
        <p style={{textAlign:"center",color:"var(--ink3)",fontSize:12,marginTop:20}}>
          Prototype interactif — cliquez les rôles, la navigation, « Réserver », « Se connecter » / « S'inscrire » pour parcourir les parcours.
        </p>
      </div>

      {auth && <AuthModal mode={auth} switchMode={setAuth} onClose={()=>setAuth(null)} onDone={doAuth} mobile={mobile}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
