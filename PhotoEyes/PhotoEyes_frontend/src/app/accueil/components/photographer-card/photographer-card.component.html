<div class="photo-card">
  <div class="card-image" >
    <img [src]="photographer.imageUrl" [alt]="photographer.nom">
  </div>
  <!--<div class="card-description">
    <h3>{{ photographer.name }}</h3>
   </div>-->
  <div class="description" >
    <div class="card-description">
      <h3>{{ photographer.nom }}  <span><i class="fa-solid fa-shield-halved"></i></span></h3>
      <p> <span><i class="fa-solid fa-location-dot"></i></span> {{ photographer.ville }}  {{ photographer.specialite }}</p>
    </div>
    <div class="description-flex">
      <div class="card-price">
        <p>à partir de</p>
        <h4>{{ photographer.prixDepart | number:'1.0-0' }} FCFA</h4>
      </div>
      <div class="arrow-right">
        <p>voir <span><i class="fa-solid fa-arrow-right"></i></span></p>
      </div>
    </div>
  </div>
</div>
