<div class="portfolio">
  <h3>Portfolio</h3>
  <div class="gallery">
      @for (photo of portfolio; track photo.id) {
      <div class="gallery-item">
          <img [src]="photo.url" [alt]="photo.label">

          @if(photo.label){
            <div class="caption">
              <span>{{ photo.label }}</span>
            </div>
          }
      </div>
      }
  </div>
</div>
