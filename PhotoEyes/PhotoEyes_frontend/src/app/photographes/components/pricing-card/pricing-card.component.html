<div class="pricing-card">
  <h3>Tarifs</h3>
  @for (tarif of tarifs; track tarif.libelle){
    <div class="price-line">
      <p>{{tarif.libelle}}</p>
      <strong>{{tarif.prix | number}} FCFA </strong>
    </div>
  }
  @if (canReserve) {
    <div class="reserve-btn">
      <button (click)="reserver.emit()">Réserver</button>
    </div>
  }
  <div class="opacity-note">
    <p> Les coordonnées du photographe restent masquées. Toute réservation passe par la plateforme.</p>
  </div>
</div>
